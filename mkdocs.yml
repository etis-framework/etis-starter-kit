site_url: https://etisframework.org/
site_name: ETIS Engineering Platform Starter Kit
site_description: >
  Engineering Trustworthy Intelligent Systems (ETIS) Engineering Platform Starter Kit.
  Repository-centered engineering guidance, reusable templates, reference implementation,
  governance, and project workspaces for building trustworthy intelligent systems.
site_author: William T. O'Connell

use_directory_urls: true

repo_url: https://github.com/etis-framework/etis-starter-kit
repo_name: ETIS Starter Kit

docs_dir: docs
site_dir: site

not_in_nav: |
  project-workspace/**
  platform-design/**
  engineering/_shared/**

theme:
  name: material
  logo: assets/etis-logo.svg
  favicon: assets/favicon.ico

  icon:
    repo: fontawesome/brands/github

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/etis-framework/etis-starter-kit
      name: ETIS Starter Kit on GitHub
    - icon: fontawesome/solid/globe
      link: https://etisframework.org
      name: ETIS Framework
  generator: false

extra_css:
  - stylesheets/extra.css
  - stylesheets/etis-ui-components.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - social

copyright: >
  © 2026 William T. O'Connell • ETIS Framework

