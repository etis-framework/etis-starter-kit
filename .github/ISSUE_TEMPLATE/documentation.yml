name: Documentation issue
description: Report confusing, incomplete, inconsistent, or outdated documentation.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: textarea
    id: page
    attributes:
      label: Page or file
      description: Identify the affected page or file.
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: Documentation issue
      description: What should be clarified, corrected, or improved?
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
    validations:
      required: false
