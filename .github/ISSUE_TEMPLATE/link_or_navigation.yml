name: Link or navigation issue
description: Report broken links, confusing navigation, or MkDocs strict-build link warnings.
title: "[Navigation]: "
labels: ["navigation", "documentation"]
body:
  - type: textarea
    id: location
    attributes:
      label: Affected page or file
      description: Where is the broken link or navigation issue?
    validations:
      required: true

  - type: textarea
    id: broken
    attributes:
      label: What is broken?
      description: Include the link text, href, URL, or mkdocs warning.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected destination
      description: Where should the link go?
    validations:
      required: false
