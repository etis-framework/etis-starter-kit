name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for stale folders
        run: |
          test ! -d "docs/template-library/governance/old"
          test ! -d "docs/template-library/implementation/untitled folder"

      - name: Check for Git conflict markers
        run: |
          ! grep -RIn --exclude-dir=.git -E '^(<<<<<<<|=======|>>>>>>>)' .

      - name: Check for remaining .gitkeep files
        run: |
          if find . -type f -name ".gitkeep" | grep .; then
            echo ".gitkeep files found. Remove them if directories already contain real files."
            exit 1
          fi

      - name: Check for bad raw HTML README.md links
        run: |
          if grep -RIn --include="*.md" 'href="[^"]*README\.md"' docs; then
            echo "Raw HTML href links should use site URLs ending in /, not README.md."
            exit 1
          fi

      - name: Check for bad raw HTML .md links in Project Workspace
        run: |
          if grep -RIn --include="*.md" 'href="[^"]*\.md"' docs/project-workspace; then
            echo "Project Workspace raw HTML card links should use generated site URLs ending in /."
            echo "Markdown links may use .md; raw HTML href links should not."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install mkdocs-material
          fi

      - name: Build documentation strictly
        run: mkdocs build --strict
